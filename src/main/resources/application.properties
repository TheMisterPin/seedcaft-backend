spring.application.name=mocks

# Datasource (prefer explicit Spring vars, no nested fallbacks)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mocks}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mocks_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.enabled=true