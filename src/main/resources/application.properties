spring.application.name=mocks

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mocks}
spring.datasource.username=${DB_USERNAME:mocks_admin}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Existing DB was created without Flyway; baseline at 0 so numbered migrations (e.g. V2) still run.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
